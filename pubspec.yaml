name: flutter_quran_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # QURAN
  quran: ^1.4.1

  # UI
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3

  # STORAGE
  shared_preferences: ^2.5.2

  # AUDIO
  just_audio: ^0.10.5
  audio_service: ^0.18.12

  # SPEECH
  speech_to_text: ^7.0.0
  flutter_slidable: ^4.0.3
  share_plus: ^12.0.2
  provider: ^6.1.5+1
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_timezone: ^3.0.1
  intl: ^0.20.2
  smooth_page_indicator: ^2.0.1
  animate_do: ^5.1.0
  dio: ^5.9.2
  audioplayers: ^6.6.0
  path_provider: ^2.1.5
  battery_plus: ^7.0.0
  connectivity_plus: ^6.1.0
  storage_space: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icon/
    - assets/fatihah/

  fonts:
    - family: hafs
      fonts:
        - asset: assets/fonts/UthmanicHafs_V20.ttf
    - family: naskh
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-VariableFont_wght.ttf

dependency_overrides:
  connectivity_plus: 6.1.0
