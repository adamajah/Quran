name: flutter_quran_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # QURAN
  quran: ^1.3.3
  quran_library: 2.2.1

  # UI
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3

  # STORAGE
  shared_preferences: ^2.5.2

  # AUDIO
  just_audio: ^0.10.5
  audio_service: ^0.18.12

  # SPEECH
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icon/

dependency_overrides:
  connectivity_plus: 6.1.0